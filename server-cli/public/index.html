<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atendente Pinguim 🐧 — local</title>
<!-- V2.5 Commit 3 fix: importa estilos isolados do Salao dos Mestres (.squad-overlay/.squad-modal/etc) -->
<link rel="stylesheet" href="/mission-control/css/squad-overlay.css">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --card: #1a1a28;
    --border: #2a2a3e;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --laranja: #E85C00;
    --grad: linear-gradient(135deg, #4f8cff, #8b5cf6, #ec4899);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .app {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 900px; margin: 0 auto;
  }
  header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header h1 span { color: var(--laranja); }
  .status {
    font-size: .75rem; color: var(--text3);
    display: flex; align-items: center; gap: .5rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #10b981; box-shadow: 0 0 8px #10b981;
  }
  .dot.off { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
  .dot.loading { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
  }
  .empty {
    margin: auto; text-align: center; color: var(--text3);
    max-width: 500px;
  }
  .empty h2 { font-size: 1.5rem; margin-bottom: .5rem; color: var(--text); }
  .empty p { font-size: .9rem; margin-bottom: 1rem; }
  .empty .hint { font-size: .8rem; color: var(--text2); }
  .empty code {
    background: var(--card); padding: .15rem .4rem; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: .8em;
  }

  .msg {
    display: flex; gap: .75rem;
    animation: fadeUp .3s ease-out;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { flex-direction: row-reverse; }
  .msg .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--laranja); }
  .msg .bubble {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: .75rem 1rem;
    max-width: 75%;
  }
  .msg.user .bubble {
    background: rgba(232, 92, 0, 0.1); border-color: rgba(232, 92, 0, 0.3);
  }
  .msg .bubble p { margin: 0 0 .5rem 0; }
  .msg .bubble p:last-child { margin-bottom: 0; }
  .msg .bubble pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: .5rem .75rem;
    overflow-x: auto; font-size: .85em;
    font-family: 'JetBrains Mono', monospace;
    margin: .5rem 0;
  }
  .msg .bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: .85em; background: var(--bg);
    padding: .1rem .3rem; border-radius: 3px;
  }
  .msg .bubble pre code { background: transparent; padding: 0; }
  .msg .bubble h1, .msg .bubble h2, .msg .bubble h3 {
    margin: .5rem 0; font-weight: 600;
  }
  .msg .bubble h1 { font-size: 1.2em; }
  .msg .bubble h2 { font-size: 1.1em; }
  .msg .bubble h3 { font-size: 1em; }
  .msg .bubble ul, .msg .bubble ol { padding-left: 1.5rem; margin: .5rem 0; }
  .msg .bubble li { margin: .25rem 0; }
  .msg .bubble strong { color: var(--text); }
  .msg .bubble table {
    border-collapse: collapse; margin: .5rem 0; font-size: .85em;
  }
  .msg .bubble th, .msg .bubble td {
    border: 1px solid var(--border); padding: .3rem .6rem;
    text-align: left;
  }
  .msg .bubble th { background: var(--bg); font-weight: 600; }
  .msg .meta { font-size: .7rem; color: var(--text3); margin-top: .25rem; }

  .typing { display: flex; gap: .25rem; }
  .typing span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text3);
    animation: typing 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing { 0%,60%,100% { opacity: .3; } 30% { opacity: 1; } }

  .input-area {
    padding: 1rem 1.5rem; border-top: 1px solid var(--border);
    background: var(--bg2);
  }
  .input-area form {
    display: flex; gap: .75rem; align-items: flex-end;
  }
  textarea {
    flex: 1; min-height: 44px; max-height: 200px;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: .75rem 1rem;
    font: inherit; font-size: .95rem; resize: none;
    outline: none; transition: border-color .2s;
  }
  textarea:focus { border-color: var(--laranja); }
  button {
    background: var(--laranja); color: white; border: none;
    border-radius: 8px; padding: .75rem 1.25rem;
    font: inherit; font-weight: 600; cursor: pointer;
    transition: opacity .2s;
  }
  button:hover { opacity: .9; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  .err {
    background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5; padding: .75rem 1rem; border-radius: 8px;
    margin: .5rem 0; font-size: .9rem;
  }

  /* V2.10 — Cartao de entregavel HTML pronto */
  .entregavel-card {
    background: linear-gradient(135deg, rgba(232, 92, 0, 0.08), rgba(232, 92, 0, 0.02));
    border: 1px solid rgba(232, 92, 0, 0.25);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-top: .75rem;
    transition: border-color .2s;
  }
  .entregavel-card:hover { border-color: rgba(232, 92, 0, 0.5); }
  .entregavel-card-head {
    display: flex; align-items: center; gap: .6rem;
    margin-bottom: .5rem;
    font-size: .85rem; font-weight: 600;
    color: var(--laranja);
    text-transform: uppercase; letter-spacing: .04em;
  }
  .entregavel-card-titulo {
    font-size: .95rem; font-weight: 500; color: var(--text);
    margin-bottom: .35rem;
  }
  .entregavel-card-preview {
    font-size: .82rem; color: var(--text2);
    line-height: 1.5; margin-bottom: .75rem;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entregavel-card-acao {
    display: inline-flex; align-items: center; gap: .4rem;
    background: var(--laranja); color: white;
    font-size: .8rem; font-weight: 600;
    padding: .45rem .9rem; border-radius: 6px;
    text-decoration: none; transition: opacity .15s;
  }
  .entregavel-card-acao:hover { opacity: .9; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Atendente <span>Pinguim 🐧</span> <span style="font-size:.7em; color: var(--text3); font-weight: 400;">local · Max</span></h1>
    <div class="status">
      <label style="display:flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--text2); cursor:pointer; user-select:none;">
        <input type="checkbox" id="toggle-anim" style="cursor:pointer;">
        <span>Animação Salão</span>
      </label>
      <div class="dot" id="status-dot"></div>
      <span id="status-txt">conectado</span>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <h2>Pinguim local 🐧</h2>
      <p>Atendente rodando via <code>claude</code> CLI na sua máquina.<br>Token externo: zero. Consumo: assinatura Max.</p>
      <p class="hint">Pra começar, digite uma mensagem abaixo.<br>Tente: <em>"oi"</em> ou <em>"o que é o Elo?"</em></p>
    </div>
  </div>

  <div class="input-area">
    <form id="form">
      <textarea id="input" placeholder="Digite sua mensagem... (Enter envia, Shift+Enter quebra linha)" rows="1"></textarea>
      <button type="submit" id="send">Enviar</button>
    </form>
  </div>
</div>

<script type="module">
// V2.5 Commit 3 — chat real chama animacao do Salao dos Mestres em paralelo
// quando backend detecta pedido criativo.
import { iniciarSquadCopyParalelo } from '/mission-control/js/squad-copy-modal.js?v=20260508d';

const messagesEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const form = document.getElementById('form');
const input = document.getElementById('input');
const send = document.getElementById('send');
const statusDot = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-txt');
const toggleAnim = document.getElementById('toggle-anim');

const threadId = 'thread-' + Date.now();

// V2.5 hotfix: trava de mensagens em paralelo. inFlight=true bloqueia tanto
// submit do botao quanto Enter no textarea. Igual ChatGPT: nao deixa mandar
// segunda mensagem enquanto a primeira nao respondeu (evita respostas fora
// de ordem que confundem o usuario).
let inFlight = false;

function setInFlight(travado) {
  inFlight = travado;
  send.disabled = travado;
  input.disabled = travado;
  input.placeholder = travado
    ? 'Aguardando resposta... (mensagens encavaladas saem fora de ordem)'
    : 'Digite sua mensagem... (Enter envia, Shift+Enter quebra linha)';
}

// Sincroniza toggle com localStorage (mesma chave do squad principal — V2.4)
toggleAnim.checked = localStorage.getItem('pinguim_squad_animacao') === 'on';
toggleAnim.addEventListener('change', () => {
  localStorage.setItem('pinguim_squad_animacao', toggleAnim.checked ? 'on' : 'off');
});

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

// Enter envia, Shift+Enter quebra linha. Trava se ja tem requisicao em voo.
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (inFlight) return; // bloqueia Enter encavalado
    form.requestSubmit();
  }
});

// Markdown bem simples (negrito, italico, code, headers, listas, paragrafos)
function md(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // code block
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code}</code></pre>`);
  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // italic
  html = html.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
  // lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // paragraphs
  html = html.split(/\n\n+/).map(p => {
    if (p.match(/^<(h\d|pre|ul|ol|table)/)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
  return html;
}

function addMsg(role, content, meta = '', extras = {}) {
  if (emptyEl) emptyEl.remove();
  const msg = document.createElement('div');
  msg.className = 'msg ' + role;

  // V2.10 — quando vier entregavel_url, NAO mostra markdown inteiro inline.
  // Mostra cartao de entregavel + preview + link pra rota /entregavel/<id>.
  let bubbleHtml;
  if (role === 'user') {
    bubbleHtml = `<p>${content.replace(/\n/g, '<br>')}</p>`;
  } else if (extras.entregavelUrl) {
    const titulo = extras.entregavelTitulo || 'Entregável pronto';
    const preview = extras.entregavelPreview
      ? `<div class="entregavel-card-preview">${md(extras.entregavelPreview)}</div>`
      : '';
    bubbleHtml = `
      <div class="entregavel-card">
        <div class="entregavel-card-head">
          <span>📄</span><span>${titulo}</span>
        </div>
        <div class="entregavel-card-titulo">${extras.pedido ? extras.pedido.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').slice(0, 100) : 'Pipeline criativo finalizado'}</div>
        ${preview}
        <a class="entregavel-card-acao" href="${extras.entregavelUrl}" target="_blank" rel="noopener">
          Abrir entregável formatado →
        </a>
      </div>
    `;
  } else {
    bubbleHtml = md(content);
  }

  msg.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🐧'}</div>
    <div>
      <div class="bubble">${bubbleHtml}</div>
      ${meta ? `<div class="meta">${meta}</div>` : ''}
    </div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return msg;
}

function addTyping() {
  // Idempotente: remove typing existente antes de adicionar pra evitar
  // 2 dots na tela (bug visto em pedido nao-criativo + toggle anim ON).
  removeTyping();
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="avatar">🐧</div>
    <div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>
  `;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function setStatus(state, text) {
  statusDot.className = 'dot ' + (state === 'ok' ? '' : state);
  statusTxt.textContent = text;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (inFlight) return; // dupla protecao — submit nao dispara enquanto em voo
  const message = input.value.trim();
  if (!message) return;

  addMsg('user', message);
  input.value = '';
  input.style.height = 'auto';
  setInFlight(true);
  setStatus('loading', 'pensando...');
  addTyping();

  const t0 = Date.now();
  let squad = null; // handle da animacao, se aberta

  try {
    // ============================================================
    // FASE A — V2.5: detectar tipo no backend (regex puro, ~1ms)
    // Se for criativo E toggle anima ON, segue two-phase com animacao.
    // ============================================================
    let plan_id = null;
    let mestresSlugs = null;

    if (toggleAnim.checked) {
      try {
        const rTipo = await fetch('/api/detectar-tipo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const tipo = await rTipo.json();

        if (rTipo.ok && tipo.anima) {
          // FASE B — pega plano (5 fontes + decide mestres)
          setStatus('loading', 'planejando elenco...');
          const rPlan = await fetch('/api/pipeline-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message }),
          });
          const plan = await rPlan.json();

          if (rPlan.ok && plan.plan_id) {
            plan_id = plan.plan_id;
            mestresSlugs = plan.mestres_usados;

            // V2.9 — titulo do modal reflete a squad real (advisory/copy/etc)
            const TITULOS_POR_SQUAD = {
              'copy':            'Pipeline criativo de copy',
              'advisory-board':  'Conselho do Advisory Board',
              'storytelling':    'Pipeline de narrativa',
              'design':          'Pipeline de direção visual',
              'traffic-masters': 'Pipeline de tráfego',
              'finops':          'Análise financeira',
            };
            const titulo = TITULOS_POR_SQUAD[tipo.squad_destino] || 'Pipeline criativo';

            // FASE C — abre animacao com elenco real e dispara em paralelo
            removeTyping();
            squad = iniciarSquadCopyParalelo({
              pedido: message,
              titulo,
              subtitulo: message.slice(0, 80) + (message.length > 80 ? '...' : ''),
              mestresSlugs,
            });
            setStatus('loading', `${mestresSlugs.length} mestre(s) escrevendo...`);
          }
          // Se /api/pipeline-plan falhou, segue caminho normal sem animacao
        }
      } catch (e) {
        console.warn('detectar-tipo/pipeline-plan falhou — segue sem animacao:', e.message);
      }
    }

    // ============================================================
    // FASE D — chama /api/chat (com plan_id se planejou; senao do zero)
    // ============================================================
    if (!squad) addTyping(); // garante typing se nao abriu animacao
    const body = { message, thread_id: threadId };
    if (plan_id) body.plan_id = plan_id;

    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();

    removeTyping();

    if (!r.ok) {
      if (squad) squad.sinalizarErro(new Error(data.error || 'erro'));
      const errEl = document.createElement('div');
      errEl.className = 'err';
      errEl.innerHTML = `<strong>Erro:</strong> ${data.error || 'desconhecido'}${data.hint ? `<br><small>${data.hint}</small>` : ''}`;
      messagesEl.appendChild(errEl);
      setStatus('off', 'erro');
    } else {
      // Sinaliza animacao que o pipeline acabou (com resultado real)
      if (squad) squad.sinalizarConclusao(data);

      const dur = data.duracao_s || ((Date.now() - t0) / 1000).toFixed(1);
      let metaTxt = `${dur}s · Max local`;
      if (data.pipeline) {
        const p = data.pipeline;
        metaTxt += ` · ${p.mestres_sucesso}/${p.mestres_total} mestres`;
        if (p.fonte_decisao === 'skill') metaTxt += ` · skill: ${p.skill_usada?.slug || '?'}`;
        else metaTxt += ' · fallback hardcoded';
      }
      if (data.epp) {
        if (data.epp.verifier_pulado) metaTxt += ' · verifier pulado';
        else if (data.epp.verifier_aprovou) metaTxt += ' · ✓ verifier';
        else if (data.epp.verifier_aprovou === false) metaTxt += ' · ⚠ verifier reprovou';
        if (data.epp.reflection_round > 0) metaTxt += ` · reflection ${data.epp.reflection_round}x`;
      }

      // V2.10 — backend decide se entregavel vira HTML ou inline.
      // Se entregavel_url veio, mostra cartao com preview + link (HTML em rota dedicada).
      // Senao, mostra markdown inline como antes.
      const extras = {};
      if (data.entregavel_url) {
        extras.entregavelUrl = data.entregavel_url;
        extras.entregavelPreview = data.entregavel_preview;
        extras.pedido = message;
        // Titulo do cartao reflete a squad real (mesmo mapping do modal)
        const TITULOS_ENTREGAVEL = {
          'copy':            '✍ Copy pronta',
          'advisory-board':  '🏛 Parecer estratégico pronto',
          'storytelling':    '📖 Narrativa pronta',
          'design':          '🎨 Direção visual pronta',
          'traffic-masters': '📈 Estratégia de tráfego pronta',
          'finops':          '💰 Análise financeira pronta',
        };
        const sq = data.pipeline?.squad;
        extras.entregavelTitulo = TITULOS_ENTREGAVEL[sq] || '📄 Entregável pronto';

        // V2.11 — se foi edicao (V2/V3...), titulo destaca isso
        if (data.edicao && data.edicao.eh_edicao && data.edicao.nova_versao) {
          const baseTit = TITULOS_ENTREGAVEL[sq] || '📄 Entregável';
          extras.entregavelTitulo = `🔄 V${data.edicao.nova_versao} pronta — ${baseTit.replace(/^[^\s]+\s/, '')}`;
          extras.parentVersao = data.edicao.parent_versao;
          extras.novaVersao = data.edicao.nova_versao;
        }
      }
      addMsg('assistant', data.content, metaTxt, extras);
      setStatus('ok', 'conectado');
    }
  } catch (err) {
    if (squad) squad.sinalizarErro(err);
    removeTyping();
    const errEl = document.createElement('div');
    errEl.className = 'err';
    errEl.textContent = 'Erro de rede: ' + err.message;
    messagesEl.appendChild(errEl);
    setStatus('off', 'desconectado');
  } finally {
    setInFlight(false);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    input.focus();
  }
});

// Foco inicial
input.focus();

// Health check inicial
fetch('/api/info').then(r => r.json()).then(d => {
  console.log('Atendente Pinguim:', d);
});
</script>
</body>
</html>
