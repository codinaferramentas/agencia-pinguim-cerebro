<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Control — Pinguim</title>
<link rel="stylesheet" href="css/style.css?v=20260421a">
</head>

<div class="app">

  <!-- Sidebar de navegação (flat, estilo Vercel) -->

      </div>
    </div>

    <div class="nav-list">

        <span class="nav-icon">⌂</span><span>Home</span>
      </div>
      <div class="nav-item has-sub" data-page="cerebros">
        <span class="nav-icon">⚛</span><span>Cérebros</span>
        <span class="nav-caret">›</span>
      </div>
      <div class="nav-item has-sub" data-page="personas">
        <span class="nav-icon">👤</span><span>Personas</span>
        <span class="nav-caret">›</span>
      </div>
      <div class="nav-item" data-page="agentes">
        <span class="nav-icon">◉</span><span>Agentes</span>
      </div>
      <div class="nav-item has-sub" data-page="squads">
        <span class="nav-icon">▦</span><span>Squads</span>
        <span class="nav-caret">›</span>
      </div>
      <div class="nav-item" data-page="operacao">
        <span class="nav-icon">⚡</span><span>Operação</span>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-item stub" data-page="conteudo">
        <span class="nav-icon">✎</span><span>Conteúdo</span>
      </div>
      <div class="nav-item stub" data-page="funis">
        <span class="nav-icon">⇝</span><span>Funis</span>
      </div>
      <div class="nav-item v2 stub" data-page="trafego">
        <span class="nav-icon">↗</span><span>Tráfego</span>
      </div>
      <div class="nav-item v2 stub" data-page="vendas">
        <span class="nav-icon">$</span><span>Vendas</span>
      </div>
      <div class="nav-item stub" data-page="suporte">
        <span class="nav-icon">♥</span><span>Suporte</span>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-item" data-page="crons">
        <span class="nav-icon">◴</span><span>Crons</span>
      </div>
      <div class="nav-item" data-page="skills">
        <span class="nav-icon">✦</span><span>Skills</span>
      </div>
      <div class="nav-item stub" data-page="biblioteca">
        <span class="nav-icon">▤</span><span>Biblioteca</span>

      <div class="nav-item" data-page="qualidade">
        <span class="nav-icon">♥</span><span>Qualidade</span>
      </div>
      <div class="nav-item stub" data-page="seguranca">
        <span class="nav-icon">⛊</span><span>Segurança</span>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-item" data-page="mapa">
        <span class="nav-icon">▥</span><span>Mapa</span>
      </div>
      <div class="nav-item" data-page="roadmap">
        <span class="nav-icon">▸</span><span>Roadmap</span>

    <div class="nav-footer">
      <div id="nav-env-badge">V0 · Carregando…</div>
      <div id="nav-env-hint">mission-control.local</div>

  <!-- Sub-sidebar contextual — SUBSTITUI a nav principal (não empilha) -->
  <aside class="subnav" id="subnav" aria-hidden="true">
    <div class="nav-brand">
      <div class="nav-brand-icon">P</div>
      <div>
        <div class="nav-brand-title">Pinguim</div>
        <div class="nav-brand-subtitle">Mission Control</div>
      </div>
    </div>
    <button class="subnav-back-row" id="subnav-back" aria-label="Voltar">
      <span class="subnav-back-icon">‹</span>
      <span class="subnav-back-label" id="subnav-title">—</span>
    </button>
    <div class="subnav-body" id="subnav-body"></div>
  </aside>

  <!-- Conteúdo -->
  <main class="main">
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-cerebros"></section>
    <section class="page" id="page-personas"></section>
    <section class="page" id="page-agentes"></section>
    <section class="page" id="page-squads"></section>
    <section class="page" id="page-operacao"></section>
    <section class="page" id="page-conteudo"></section>
    <section class="page" id="page-funis"></section>
    <section class="page" id="page-trafego"></section>

    <section class="page" id="page-skills"></section>

    <section class="page" id="page-debug"></section>
    <section class="page" id="page-mapa"></section>
    <section class="page" id="page-roadmap"></section>

  <!-- Drawer global (usado por Cérebros pra detalhe de peça) -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <strong id="drawer-title" style="font-family:var(--font-heading);font-size:.9375rem">—</strong>
      <button class="drawer-close" id="drawer-close" aria-label="Fechar">×</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
</div>

<!-- Barra de status inferior (enxuta - só operacional) -->
<div class="statusbar">
  <div class="sb-item"><b>MODO</b><span id="sb-modo">—</span></div>
  <div class="sb-item"><b>DB</b><span id="sb-db">—</span></div>
  <div class="sb-item"><b>CÉREBROS</b><span id="sb-cerebros">—</span></div>
  <div class="sb-item"><b>AGENTES</b><span id="sb-agentes">—</span></div>
  <div class="sb-item"><b>TASKS</b><span id="sb-tasks">—</span></div>
  <div class="sb-spacer"></div>
  <div class="sb-item"><span id="sb-hora">—</span></div>
</div>

<!-- Scripts (carregados em ordem de dependência) -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script type="module" src="js/sb-client.js?v=20260421a"></script>
<script type="module" src="js/app.js?v=20260421a"></script>

</html>
