<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinguim OS</title>
<link rel="stylesheet" href="css/style.css?v=20260429c">
</head>
<body>
<!-- Botao hamburger (so mobile) -->
<button id="mobile-menu-btn" class="mobile-menu-btn" type="button" aria-label="Abrir menu">
  <span></span><span></span><span></span>
</button>
<!-- Overlay do drawer mobile -->
<div id="mobile-overlay" class="mobile-overlay"></div>

<div class="app">

  <!-- Sidebar accordion — uma coluna, com expandir/recolher -->
  <nav class="nav">
    <div class="nav-top">
      <div class="nav-brand" title="Pinguim OS">
        <img class="nav-brand-icon" src="img/pinguim-icon.svg" alt="">
        <div class="nav-brand-wordmark">
          <span class="nav-brand-name">Pinguim</span>
          <span class="nav-brand-os">OS</span>
        </div>
      </div>
      <button id="nav-collapse" class="nav-collapse-btn" type="button" title="Recolher (Ctrl+B)" aria-label="Recolher">‹‹</button>
    </div>

    <div class="nav-list" id="nav-list">
      <!-- Items renderizados pelo JS — cada um pode ter children -->
    </div>

    <div class="nav-footer">
      <button class="nav-item nav-item-footer" data-page="mapa" type="button" title="Mapa do Sistema — visão geral pra apresentação">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Mapa do Sistema</span>
      </button>
      <button class="nav-item nav-item-footer" data-page="docs" type="button" title="Documentação">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Documentação</span>
      </button>
      <button id="nav-squad-toggle" class="nav-squad-toggle" type="button" title="Liga/desliga a animação do Squad ao gerar persona">
        <span class="squad-toggle-led"></span>
        <span class="nav-label" id="nav-squad-label">Squad · off</span>
      </button>
      <button id="nav-logout" class="nav-logout" type="button" title="Sair">
        <span class="nav-icon">↪</span>
        <span class="nav-label">Sair</span>
      </button>
      <div id="nav-env-badge" class="nav-env-badge" title="Ambiente">V0</div>
    </div>
  </nav>

  <!-- Conteúdo -->
  <main class="main">
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-cerebros"></section>
    <section class="page" id="page-personas"></section>
    <section class="page" id="page-docs"></section>
    <section class="page" id="page-integracoes"></section>
    <section class="page" id="page-agentes"></section>
    <section class="page" id="page-squads"></section>
    <section class="page" id="page-operacao"></section>
    <section class="page" id="page-conteudo"></section>
    <section class="page" id="page-funis" style="padding:0"></section>
    <section class="page" id="page-trafego"></section>
    <section class="page" id="page-vendas"></section>
    <section class="page" id="page-suporte"></section>
    <section class="page" id="page-crons"></section>
    <section class="page" id="page-skills"></section>
    <section class="page" id="page-biblioteca"></section>
    <section class="page" id="page-qualidade"></section>
    <section class="page" id="page-seguranca"></section>
    <section class="page" id="page-debug"></section>
    <section class="page" id="page-mapa"></section>
    <section class="page" id="page-roadmap"></section>
  </main>

  <!-- Drawer global (usado por Cérebros pra detalhe de peça) -->
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <strong id="drawer-title" style="font-family:var(--font-heading);font-size:.9375rem">—</strong>
      <button class="drawer-close" id="drawer-close" aria-label="Fechar">×</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>
</div>

<!-- Barra de status inferior (enxuta - só operacional) -->
<div class="statusbar">
  <div class="sb-item"><b>MODO</b><span id="sb-modo">—</span></div>
  <div class="sb-item"><b>DB</b><span id="sb-db">—</span></div>
  <div class="sb-item"><b>CÉREBROS</b><span id="sb-cerebros">—</span></div>
  <div class="sb-item"><b>AGENTES</b><span id="sb-agentes">—</span></div>
  <div class="sb-item"><b>TASKS</b><span id="sb-tasks">—</span></div>
  <div class="sb-spacer"></div>
  <div class="sb-item"><span id="sb-hora">—</span></div>
</div>

<script type="module">

  const ok = await guard();
  if (ok) {
    await import('./js/sb-client.js?v=20260429c');
    await import('./js/app.js?v=20260429c');
    const btn = document.getElementById('nav-logout');
    if (btn) btn.addEventListener('click', logout);
  }
</script>
</body>
</html>
